<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">MCP-201 workflow overview</title>
  <desc id="desc">A clean diagram showing the MCP-201 frontend, AI planner, backend image tools, and transformed outputs.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect x="40" y="36" width="1120" height="568" rx="28" fill="#ffffff" stroke="#dbe4f0"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="88" y="108" font-size="42" font-weight="700" fill="#0f172a">MCP-201</text>
    <text x="88" y="146" font-size="22" fill="#475569">Prompt-driven image workflow planning with a Python MCP backend and Next.js frontend.</text>
  </g>

  <rect x="88" y="176" width="228" height="36" rx="18" fill="url(#accent)"/>
  <text x="202" y="199" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#ffffff">Frontend to Planner to Tools</text>

  <g filter="url(#shadow)" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="88" y="246" width="286" height="254" rx="24" fill="#f8fbff" stroke="#cbd5e1"/>
    <rect x="456" y="246" width="288" height="254" rx="24" fill="#f8fbff" stroke="#cbd5e1"/>
    <rect x="826" y="246" width="286" height="254" rx="24" fill="#f8fbff" stroke="#cbd5e1"/>
  </g>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#0f172a">
    <text x="112" y="286" font-size="26" font-weight="700">Frontend UI</text>
    <text x="112" y="315" font-size="17" fill="#475569">Upload images and describe the task.</text>

    <rect x="112" y="346" width="238" height="60" rx="16" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="132" y="372" font-size="15" font-weight="600">Prompt</text>
    <text x="132" y="392" font-size="15" fill="#475569">"Crop and colorize this image"</text>

    <rect x="112" y="424" width="72" height="52" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
    <rect x="196" y="424" width="72" height="52" rx="12" fill="#e0f2fe" stroke="#7dd3fc"/>
    <rect x="280" y="424" width="72" height="52" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="148" y="456" text-anchor="middle" font-size="14" font-weight="600">img 1</text>
    <text x="232" y="456" text-anchor="middle" font-size="14" font-weight="600">img 2</text>
    <text x="316" y="456" text-anchor="middle" font-size="14" font-weight="600">img 3</text>

    <text x="488" y="286" font-size="26" font-weight="700">Planner + MCP Server</text>
    <text x="488" y="314" font-size="16" fill="#475569">Choose a workflow, validate inputs,</text>
    <text x="488" y="336" font-size="16" fill="#475569">and run tools securely.</text>

    <rect x="488" y="352" width="224" height="44" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="600" y="379" text-anchor="middle" font-size="15" font-weight="700">run_prompt_workflow</text>

    <rect x="488" y="410" width="224" height="70" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="512" y="435" font-size="15" font-weight="700">Workflow options</text>
    <text x="512" y="455" font-size="14" fill="#475569">crop_images</text>
    <text x="512" y="473" font-size="14" fill="#475569">colorize_images</text>
    <text x="512" y="491" font-size="14" fill="#475569">crop_then_colorize</text>

    <text x="969" y="286" text-anchor="middle" font-size="26" font-weight="700">Outputs</text>
    <text x="969" y="315" text-anchor="middle" font-size="16" fill="#475569">Transformed images</text>
    <text x="969" y="336" text-anchor="middle" font-size="16" fill="#475569">plus workflow metadata</text>

    <rect x="850" y="352" width="108" height="94" rx="18" fill="#fff7ed" stroke="#fdba74"/>
    <rect x="980" y="352" width="108" height="94" rx="18" fill="#ecfccb" stroke="#a3e635"/>
    <text x="904" y="467" text-anchor="middle" font-size="14" font-weight="700">output 1</text>
    <text x="1034" y="467" text-anchor="middle" font-size="14" font-weight="700">output 2</text>
    <rect x="850" y="458" width="238" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="869" y="474" font-size="11" font-weight="700">selected_workflow</text>
    <text x="1069" y="474" text-anchor="end" font-size="11" fill="#475569">crop_then_colorize</text>
  </g>

  <g stroke="#3b82f6" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M390 372 H432"/>
    <path d="M420 356 L446 372 L420 388"/>
    <path d="M760 372 H802"/>
    <path d="M790 356 L816 372 L790 388"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="876" y="364" width="56" height="58" rx="12" fill="#fed7aa" stroke="#fb923c" stroke-width="3"/>
    <path d="M888 380 C900 370, 920 370, 928 384" stroke="#9a3412" stroke-width="3"/>
    <path d="M892 404 C904 412, 920 412, 928 400" stroke="#9a3412" stroke-width="3"/>

    <rect x="1006" y="364" width="56" height="58" rx="12" fill="#bef264" stroke="#65a30d" stroke-width="3"/>
    <path d="M1018 380 C1030 370, 1050 370, 1058 384" stroke="#3f6212" stroke-width="3"/>
    <path d="M1022 404 C1034 412, 1050 412, 1058 400" stroke="#3f6212" stroke-width="3"/>
    <path d="M1008 364 L1060 422" stroke="#65a30d" stroke-width="3"/>

    <rect x="556" y="440" width="124" height="10" rx="5" fill="#dbeafe" stroke="none"/>
    <rect x="556" y="458" width="102" height="10" rx="5" fill="#e0e7ff" stroke="none"/>
    <rect x="556" y="476" width="148" height="10" rx="5" fill="#ede9fe" stroke="none"/>
  </g>
</svg>
